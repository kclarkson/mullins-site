{{- /* Home page. Starts minimal; the full home model (hero → upcoming reunion →
       history preview → latest news → recent activity → email/donate CTAs)
       grows in Phase 2. */ -}}
{{ define "main" }}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-lg-8">
        <h1 class="display-4 mb-3">{{ .Title }}</h1>
        {{ with .Content }}<div class="lead">{{ . }}</div>{{ end }}
      </div>
    </div>
  </div>
</section>
{{ end }}
